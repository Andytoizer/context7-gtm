name: Weekly Maintenance

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Optional run id, defaults to YYYY-MM-DD.
        required: false
        type: string
      batch_size:
        description: Tools per scout/QA batch.
        required: false
        default: "10"
        type: string
  schedule:
    - cron: "17 10 * * 1"
    - cron: "47 10 * * 4"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-maintenance
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.plan.outputs.run_id }}
      scout_matrix: ${{ steps.plan.outputs.scout_matrix }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create maintenance plan
        id: plan
        env:
          INPUT_RUN_ID: ${{ inputs.run_id }}
          INPUT_BATCH_SIZE: ${{ inputs.batch_size }}
        run: |
          RUN_ID="${INPUT_RUN_ID:-$(date -u +%F)}"
          BATCH_SIZE="${INPUT_BATCH_SIZE:-10}"
          node scripts/create-maintenance-plan.js \
            --run-id "$RUN_ID" \
            --batch-size "$BATCH_SIZE" \
            --max-agents 6

      - name: Upload maintenance plan
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-plan-${{ steps.plan.outputs.run_id }}
          path: maintenance/runs/${{ steps.plan.outputs.run_id }}/

  scout:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        batch: ${{ fromJson(needs.plan.outputs.scout_matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download maintenance plan
        uses: actions/download-artifact@v4
        with:
          name: maintenance-plan-${{ needs.plan.outputs.run_id }}
          path: maintenance/runs/${{ needs.plan.outputs.run_id }}

      - name: Run scout batch
        env:
          SCOUT_SWARM_COMMAND: ${{ secrets.SCOUT_SWARM_COMMAND }}
        run: |
          node scripts/run-scout-batch.js \
            --run-dir "maintenance/runs/${{ needs.plan.outputs.run_id }}" \
            --batch-id "${{ matrix.batch.batchId }}"

      - name: Upload scout findings
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-scout-${{ needs.plan.outputs.run_id }}-${{ matrix.batch.batchId }}
          path: maintenance/runs/${{ needs.plan.outputs.run_id }}/scout-findings/${{ matrix.batch.batchId }}.json

  qa:
    needs:
      - plan
      - scout
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        batch: ${{ fromJson(needs.plan.outputs.scout_matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download maintenance plan
        uses: actions/download-artifact@v4
        with:
          name: maintenance-plan-${{ needs.plan.outputs.run_id }}
          path: maintenance/runs/${{ needs.plan.outputs.run_id }}

      - name: Download scout findings
        uses: actions/download-artifact@v4
        with:
          pattern: maintenance-scout-${{ needs.plan.outputs.run_id }}-*
          path: maintenance/runs/${{ needs.plan.outputs.run_id }}/scout-findings
          merge-multiple: true

      - name: Run QA batch
        env:
          QA_SWARM_COMMAND: ${{ secrets.QA_SWARM_COMMAND }}
        run: |
          node scripts/run-qa-batch.js \
            --run-dir "maintenance/runs/${{ needs.plan.outputs.run_id }}" \
            --batch-id "${{ matrix.batch.batchId }}"

      - name: Upload QA verdicts
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-qa-${{ needs.plan.outputs.run_id }}-${{ matrix.batch.batchId }}
          path: maintenance/runs/${{ needs.plan.outputs.run_id }}/qa-verdicts/${{ matrix.batch.batchId }}.json

  report:
    needs:
      - plan
      - scout
      - qa
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download maintenance plan
        uses: actions/download-artifact@v4
        with:
          name: maintenance-plan-${{ needs.plan.outputs.run_id }}
          path: maintenance/runs/${{ needs.plan.outputs.run_id }}

      - name: Download scout findings
        uses: actions/download-artifact@v4
        with:
          pattern: maintenance-scout-${{ needs.plan.outputs.run_id }}-*
          path: maintenance/runs/${{ needs.plan.outputs.run_id }}/scout-findings
          merge-multiple: true

      - name: Download QA verdicts
        uses: actions/download-artifact@v4
        with:
          pattern: maintenance-qa-${{ needs.plan.outputs.run_id }}-*
          path: maintenance/runs/${{ needs.plan.outputs.run_id }}/qa-verdicts
          merge-multiple: true

      - name: Apply QA-approved metadata changes
        run: node scripts/apply-approved-findings.js --run-dir "maintenance/runs/${{ needs.plan.outputs.run_id }}"

      - name: Render maintenance report
        run: node scripts/render-maintenance-report.js --run-dir "maintenance/runs/${{ needs.plan.outputs.run_id }}"

      - name: Run registry checks
        run: |
          npm run validate
          npm run eval
          npm run reports
          npm run verify:sources || true
          npm run detect:drift || true

      - name: Create maintenance pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: maintenance/${{ needs.plan.outputs.run_id }}
          title: "Weekly registry maintenance: ${{ needs.plan.outputs.run_id }}"
          commit-message: "Add maintenance run ${{ needs.plan.outputs.run_id }}"
          body-path: maintenance/runs/${{ needs.plan.outputs.run_id }}/report.md
          add-paths: |
            registry.json
            tools
            maintenance/runs/${{ needs.plan.outputs.run_id }}
            reports
          labels: |
            maintenance
            automated
